# Sweep over modular operations to compare grokking dynamics
# Operations: addition, subtraction, multiplication, x2_plus_y2, x3_plus_xy

p: 113
operation: addition
train_fraction: 0.3

d_model: 128
n_heads: 4
d_mlp: 512
n_layers: 1
activation: relu
use_layernorm: false
tie_embeddings: false

max_epochs: 40000
optimizer: adamw
lr: 1.0e-3
beta1: 0.9
beta2: 0.999

eval_interval: 100
fourier_interval: 500
checkpoint_interval: 10000
n_top_frequencies: 5

weight_decay: 1.0
seed: 42
