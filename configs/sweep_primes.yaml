# Sweep over different primes to see how key frequencies change
# Different primes produce different key frequency sets

operation: addition
train_fraction: 0.3

d_model: 128
n_heads: 4
d_mlp: 512
n_layers: 1
activation: relu
use_layernorm: false
tie_embeddings: false

max_epochs: 40000
optimizer: adamw
lr: 1.0e-3
weight_decay: 1.0
beta1: 0.9
beta2: 0.999

eval_interval: 100
fourier_interval: 500
checkpoint_interval: 10000
n_top_frequencies: 5

# Sweep values (run with different --p)
# Suggested: 59, 67, 71, 89, 97, 113
p: 113
seed: 42
