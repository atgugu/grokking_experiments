# Sweep over learning rate to study optimization dynamics
# Higher lr -> faster convergence but potential instability
# Lower lr -> slower training, may not grok within budget

p: 113
operation: addition
train_fraction: 0.3

d_model: 128
n_heads: 4
d_mlp: 512
n_layers: 1
activation: relu
use_layernorm: false
tie_embeddings: false

max_epochs: 40000
optimizer: adamw
lr: 1.0e-3
beta1: 0.9
beta2: 0.999

eval_interval: 100
fourier_interval: 500
checkpoint_interval: 10000
n_top_frequencies: 5

# Sweep values (run with different --lr-values)
# Suggested: 1e-4, 3e-4, 1e-3, 3e-3, 1e-2
weight_decay: 1.0
seed: 42
