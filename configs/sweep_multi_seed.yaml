# Multi-seed validation sweep for joint (n_heads x p) findings
#
# Tests robustness of key findings across seeds {42, 137, 256}:
#   1. h=1 groks fastest (Finding 1)
#   2. Phase transition invariance at p=43->59 (Finding 3)
#   3. p=43/h=1 partial grokking anomaly (Finding 2)
#
# Grid: p in {43, 59, 67, 113} x n_heads in {1, 2, 4, 8} x seed in {42, 137, 256}
# Both p, n_heads, and seed are overridden per-run in the sweep script.

operation: addition
train_fraction: 0.3

d_model: 128
n_heads: 4
d_mlp: 512
n_layers: 1
activation: relu
use_layernorm: false
tie_embeddings: false

max_epochs: 40000
optimizer: adamw
lr: 1.0e-3
weight_decay: 1.0
beta1: 0.9
beta2: 0.999

eval_interval: 100
fourier_interval: 500
checkpoint_interval: 10000
n_top_frequencies: 5

p: 113
seed: 42
